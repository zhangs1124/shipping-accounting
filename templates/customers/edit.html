{% extends "base.html" %}
{% block title %}編輯客戶{% endblock %}
{% block content %}

<div class="page-header">
    <h1>✏️ 編輯客戶</h1>
    <a href="/customers" class="btn btn-secondary">← 返回清單</a>
</div>

{% if error %}
<div class="alert alert-error">{{ error }}</div>
{% endif %}

<div class="card">
    <form method="post" action="/customers/{{ customer.id }}/edit">
        <div class="form-grid">
            <div class="form-group">
                <label>客戶名稱 *</label>
                <input type="text" name="name" required maxlength="150" value="{{ customer.name }}">
            </div>
            <div class="form-group">
                <label>聯絡人</label>
                <input type="text" name="contact" maxlength="100" value="{{ customer.contact or '' }}">
            </div>
            <div class="form-group">
                <label>電話</label>
                <input type="text" name="phone" maxlength="50" value="{{ customer.phone or '' }}">
            </div>
            <div class="form-group">
                <label>電子信箱</label>
                <input type="text" name="email" maxlength="100" value="{{ customer.email or '' }}">
            </div>
            <div class="form-group" style="grid-column: 1 / -1;">
                <label>地址</label>
                <input type="text" name="address" maxlength="250" value="{{ customer.address or '' }}">
            </div>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">儲存</button>
            <a href="/customers" class="btn btn-secondary">取消</a>
        </div>
    </form>
</div>

{% endblock %}
