{% extends "base.html" %}
{% block title %}新增客戶{% endblock %}
{% block content %}

<div class="page-header">
    <h1>＋ 新增客戶</h1>
    <a href="/customers" class="btn btn-secondary">← 返回清單</a>
</div>

{% if error %}
<div class="alert alert-error">{{ error }}</div>
{% endif %}

<div class="card">
    <form method="post" action="/customers/new">
        <div class="form-grid">
            <div class="form-group">
                <label>客戶名稱 *</label>
                <input type="text" name="name" required maxlength="150"
                       value="{{ form_data.name if form_data else '' }}">
            </div>
            <div class="form-group">
                <label>聯絡人</label>
                <input type="text" name="contact" maxlength="100"
                       value="{{ form_data.contact if form_data else '' }}">
            </div>
            <div class="form-group">
                <label>電話</label>
                <input type="text" name="phone" maxlength="50"
                       value="{{ form_data.phone if form_data else '' }}">
            </div>
            <div class="form-group">
                <label>電子信箱</label>
                <input type="text" name="email" maxlength="100"
                       value="{{ form_data.email if form_data else '' }}">
            </div>
            <div class="form-group" style="grid-column: 1 / -1;">
                <label>地址</label>
                <input type="text" name="address" maxlength="250"
                       value="{{ form_data.address if form_data else '' }}">
            </div>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">建立</button>
            <a href="/customers" class="btn btn-secondary">取消</a>
        </div>
    </form>
</div>

{% endblock %}
