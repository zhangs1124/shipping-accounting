{% extends "base.html" %}
{% block title %}新增帳單{% endblock %}
{% block content %}

<div class="page-header">
    <h1>＋ 新增帳單</h1>
    <a href="/invoices" class="btn btn-secondary">← 返回清單</a>
</div>

{% if error %}
<div class="alert alert-error">{{ error }}</div>
{% endif %}

<div class="card">
    <form method="post" action="/invoices">
        <div class="form-grid">
            <div class="form-group">
                <label>帳單編號 *</label>
                <input type="text" name="invoice_no" required maxlength="30"
                       value="{{ form_data.invoice_no if form_data else '' }}"
                       placeholder="例：INV-2024-001">
            </div>
            <div class="form-group">
                <label>航次 *</label>
                <select name="voyage_id" required>
                    <option value="">-- 選擇航次 --</option>
                    {% for v in voyages %}
                    <option value="{{ v.id }}"
                        {% if form_data and form_data.voyage_id == v.id %}selected{% endif %}>
                        {{ v.voyage_no }} ({{ v.ship.name }})
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>客戶名稱 *</label>
                <input type="text" name="customer_name" required maxlength="100"
                       value="{{ form_data.customer_name if form_data else '' }}">
            </div>
            <div class="form-group">
                <label>帳單日期 *</label>
                <input type="date" name="invoice_date" required
                       value="{{ form_data.invoice_date if form_data else '' }}">
            </div>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">建立帳單</button>
            <a href="/invoices" class="btn btn-secondary">取消</a>
        </div>
    </form>
</div>

{% endblock %}
