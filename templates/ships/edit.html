{% extends "base.html" %}
{% block title %}編輯船舶{% endblock %}
{% block content %}

<div class="page-header">
    <h1>✏️ 編輯船舶</h1>
    <a href="/ships" class="btn btn-secondary">← 返回清單</a>
</div>

<div class="card">
    <form method="post" action="/ships/{{ ship.id }}/edit">
        <div class="form-grid">
            <div class="form-group">
                <label>船舶代碼（不可修改）</label>
                <input type="text" value="{{ ship.code }}" disabled style="background:#f0f0f0;">
            </div>
            <div class="form-group">
                <label>船名 *</label>
                <input type="text" name="name" required value="{{ ship.name }}">
            </div>
            <div class="form-group">
                <label>船旗國</label>
                <input type="text" name="flag" value="{{ ship.flag or '' }}">
            </div>
            <div class="form-group">
                <label>船型</label>
                <input type="text" name="ship_type" value="{{ ship.ship_type or '' }}">
            </div>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">儲存</button>
            <a href="/ships" class="btn btn-secondary">取消</a>
        </div>
    </form>
</div>

{% endblock %}
