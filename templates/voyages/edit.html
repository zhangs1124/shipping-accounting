{% extends "base.html" %}
{% block title %}編輯航次{% endblock %}
{% block content %}

<div class="page-header">
    <h1>✏️ 編輯航次</h1>
    <a href="/voyages" class="btn btn-secondary">← 返回清單</a>
</div>

<div class="card">
    <form method="post" action="/voyages/{{ voyage.id }}/edit">
        <div class="form-grid">
            <div class="form-group">
                <label>航次編號（不可修改）</label>
                <input type="text" value="{{ voyage.voyage_no }}" disabled style="background:#f0f0f0;">
            </div>
            <div class="form-group">
                <label>船舶 *</label>
                <select name="ship_id" required>
                    {% for ship in ships %}
                    <option value="{{ ship.id }}" {% if ship.id == voyage.ship_id %}selected{% endif %}>
                        {{ ship.code }} - {{ ship.name }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>出發港</label>
                <input type="text" name="port_of_loading" value="{{ voyage.port_of_loading or '' }}">
            </div>
            <div class="form-group">
                <label>目的港</label>
                <input type="text" name="port_of_discharge" value="{{ voyage.port_of_discharge or '' }}">
            </div>
            <div class="form-group">
                <label>預計出發日期</label>
                <input type="date" name="etd"
                       value="{{ voyage.etd.strftime('%Y-%m-%d') if voyage.etd else '' }}">
            </div>
            <div class="form-group">
                <label>預計抵達日期</label>
                <input type="date" name="eta"
                       value="{{ voyage.eta.strftime('%Y-%m-%d') if voyage.eta else '' }}">
            </div>
            <div class="form-group">
                <label>狀態</label>
                <select name="status">
                    {% for s in statuses %}
                    <option value="{{ s }}" {% if s == voyage.status %}selected{% endif %}>{{ s }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">儲存</button>
            <a href="/voyages" class="btn btn-secondary">取消</a>
        </div>
    </form>
</div>

{% endblock %}
